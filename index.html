document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ck=\"{{ nav.log.go }}\" style=\"display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;cursor:pointer;font-size:15px;font-weight:500;color:{{ nav.log.col }};background:{{ nav.log.bg }};\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6.5 6.5l11 11M5 9l-2 2 3 3M19 15l2-2-3-3M9 5L7 3M15 19l2 2\"><\u002Fpath><\u002Fsvg>Registrar<\u002Fdiv>\n      <div onclick=\"{{ nav.progress.go }}\" style=\"display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;cursor:pointer;font-size:15px;font-weight:500;color:{{ nav.progress.col }};background:{{ nav.progress.bg }};\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 19V5M4 19h16M8 15l3-4 3 2 4-6\"><\u002Fpath><\u002Fsvg>Progreso<\u002Fdiv>\n      <div onclick=\"{{ nav.measure.go }}\" style=\"display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;cursor:pointer;font-size:15px;font-weight:500;color:{{ nav.measure.col }};background:{{ nav.measure.bg }};\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"7\" width=\"18\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M7 7v3M11 7v4M15 7v3M19 7v4\"><\u002Fpath><\u002Fsvg>Medidas<\u002Fdiv>\n      <div onclick=\"{{ nav.settings.go }}\" style=\"display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;cursor:pointer;font-size:15px;font-weight:500;color:{{ nav.settings.col }};background:{{ nav.settings.bg }};\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3.2\"><\u002Fcircle><path d=\"M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8\"><\u002Fpath><\u002Fsvg>Ajustes<\u002Fdiv>\n      <div style=\"margin-top:auto;border:1px solid #1C1F26;border-radius:12px;padding:11px;font-size:12px;color:#6E7480;line-height:1.4;\">Tus datos viven solo en este dispositivo. Sin nube, sin cuentas.<\u002Fdiv>\n    <\u002Faside>\n    <\u002Fsc-if>\n\n    <!-- ===== MAIN ===== -->\n    <main style=\"flex:1;min-width:0;\">\n      <div style=\"width:100%;max-width:760px;margin:0 auto;padding:24px 18px 120px;\">\n\n        <!-- ===================== DASHBOARD ===================== -->\n        <sc-if value=\"{{ isDash }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;\">\n            <div>\n              <div style=\"color:#8A8F9C;font-size:14px;\">{{ monthLabel }}<\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:30px;letter-spacing:-0.02em;line-height:1;\">{{ greeting }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"width:44px;height:44px;border-radius:50%;background:#171A20;border:1px solid #262A33;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;color:#8A8F9C;\">{{ initial }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isFirstRun }}\">\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:18px;margin-bottom:14px;\">\n              <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:4px;\">¡Bienvenido!<\u002Fdiv>\n              <div style=\"color:#A7ACB8;font-size:14px;line-height:1.45;margin-bottom:14px;\">Configura tu perfil y crea tus rutinas en Ajustes, luego registra tu primer entreno y tus medidas.<\u002Fdiv>\n              <div style=\"display:flex;gap:10px;\">\n                <div onclick=\"{{ goSettings }}\" style=\"flex:1;background:var(--ac);color:var(--act);border-radius:12px;padding:12px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;\">Ir a Ajustes<\u002Fdiv>\n                <div onclick=\"{{ goLog }}\" style=\"flex:1;background:#171A20;border:1px solid #2A2E37;border-radius:12px;padding:12px;text-align:center;font-weight:600;font-size:14px;cursor:pointer;\">Registrar entreno<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;\">\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:14px;\">\n              <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:7px;\">Peso<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:5px;\"><span style=\"font-family:'Archivo';font-weight:800;font-size:29px;letter-spacing:-0.02em;\">{{ statWeight }}<\u002Fspan><span style=\"color:#8A8F9C;font-size:14px;\">{{ unit }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12.5px;color:{{ statWeightCol }};margin-top:5px;\">{{ statWeightDelta }} vs mes ant.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:14px;\">\n              <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:7px;\">Grasa corporal<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:5px;\"><span style=\"font-family:'Archivo';font-weight:800;font-size:29px;letter-spacing:-0.02em;\">{{ statFat }}<\u002Fspan><span style=\"color:#8A8F9C;font-size:14px;\">%<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12.5px;color:{{ statFatCol }};margin-top:5px;\">{{ statFatDelta }} vs mes ant.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:14px;\">\n              <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:7px;\">Entrenos<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:5px;\"><span style=\"font-family:'Archivo';font-weight:800;font-size:29px;letter-spacing:-0.02em;\">{{ statWorkouts }}<\u002Fspan><span style=\"color:#8A8F9C;font-size:14px;\">este mes<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#8A8F9C;margin-top:5px;\">{{ statSets }} series totales<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:14px;\">\n              <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:7px;\">Volumen<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:5px;\"><span style=\"font-family:'Archivo';font-weight:800;font-size:29px;letter-spacing:-0.02em;\">{{ statVolume }}<\u002Fspan><span style=\"color:#8A8F9C;font-size:14px;\">{{ unit }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#8A8F9C;margin-top:5px;\">levantado este mes<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:20px;padding:16px 16px 6px;margin-bottom:12px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;\">\n              <div>\n                <div style=\"color:#8A8F9C;font-size:13px;\">Evolución de peso<\u002Fdiv>\n                <div style=\"font-family:'Archivo';font-weight:800;font-size:25px;letter-spacing:-0.02em;\">{{ statWeight }} <span style=\"font-size:13px;color:#8A8F9C;font-weight:500;\">{{ unit }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;font-size:12.5px;color:#8A8F9C;\">{{ entryMeasures }} registros<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasMeasures }}\">\n            <svg viewBox=\"0 0 600 200\" width=\"100%\" height=\"auto\" style=\"display:block;\">\n              <line x1=\"10\" y1=\"50\" x2=\"590\" y2=\"50\" stroke=\"#20242C\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"10\" y1=\"110\" x2=\"590\" y2=\"110\" stroke=\"#20242C\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"10\" y1=\"170\" x2=\"590\" y2=\"170\" stroke=\"#20242C\" stroke-width=\"1\"><\u002Fline>\n              <polygon points=\"{{ dashChart.area }}\" fill=\"var(--ac)\" opacity=\"0.10\"><\u002Fpolygon>\n              <polyline points=\"{{ dashChart.points }}\" fill=\"none\" stroke=\"var(--ac)\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n              <circle cx=\"{{ dashChart.last.x }}\" cy=\"{{ dashChart.last.y }}\" r=\"6\" fill=\"var(--ac)\"><\u002Fcircle>\n            <\u002Fsvg>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noMeasures }}\"><div style=\"padding:34px 0;text-align:center;color:#6E7480;font-size:14px;\">Registra tus medidas para ver tu evolución.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:10px;margin-bottom:14px;\">\n            <div onclick=\"{{ goLog }}\" style=\"flex:1;background:var(--ac);color:var(--act);border-radius:14px;padding:14px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;\">+ Registrar entreno<\u002Fdiv>\n            <div onclick=\"{{ goMeasure }}\" style=\"flex:1;background:#171A20;border:1px solid #2A2E37;color:#F4F5F7;border-radius:14px;padding:14px;text-align:center;font-weight:600;font-size:15px;cursor:pointer;\">Medidas del mes<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:4px 16px 8px;\">\n            <div style=\"padding:13px 0 4px;color:#8A8F9C;font-size:13px;\">Entrenos recientes<\u002Fdiv>\n            <sc-for list=\"{{ recent }}\" as=\"w\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid #20242C;\">\n                <div><div style=\"font-weight:600;font-size:15px;\">{{ w.routine }}<\u002Fdiv><div style=\"color:#8A8F9C;font-size:12.5px;margin-top:1px;\">{{ w.summary }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"color:#8A8F9C;font-size:13px;\">{{ w.date }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noWorkouts }}\"><div style=\"padding:18px 0;text-align:center;color:#6E7480;font-size:14px;\">Aún no hay entrenos. ¡Registra el primero!<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===================== LOG WORKOUT ===================== -->\n        <sc-if value=\"{{ isLog }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"margin-bottom:18px;\">\n            <div style=\"color:#8A8F9C;font-size:14px;\">{{ todayLabel }}<\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:28px;letter-spacing:-0.02em;line-height:1;\">Registrar entreno<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;\">\n            <span style=\"color:#8A8F9C;font-size:13px;\">Rutina<\u002Fspan>\n            <span onclick=\"{{ goSettings }}\" style=\"color:var(--ac);font-size:13px;cursor:pointer;\">+ Gestionar rutinas<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;\">\n            <sc-for list=\"{{ routineChips }}\" as=\"r\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ r.go }}\" style=\"padding:8px 15px;border-radius:999px;border:1px solid {{ r.bd }};background:{{ r.bg }};color:{{ r.fg }};font-size:14px;font-weight:600;cursor:pointer;\">{{ r.name }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ draftExercises }}\" as=\"ex\" hint-placeholder-count=\"1\">\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:14px;margin-bottom:12px;\">\n              <div style=\"display:flex;gap:8px;align-items:center;margin-bottom:12px;\">\n                <input value=\"{{ ex.name }}\" oninput=\"{{ ex.onName }}\" placeholder=\"Nombre del ejercicio\" style=\"flex:1;background:#0E1014;border:1px solid #2A2E37;border-radius:10px;color:#F4F5F7;font-family:'Space Grotesk';font-weight:600;font-size:15px;padding:10px 12px;\">\n                <div onclick=\"{{ ex.remove }}\" style=\"width:38px;height:38px;flex:0 0 38px;border-radius:10px;border:1px solid #2A2E37;color:#8A8F9C;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;\">×<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:36px 1fr 1fr 34px;gap:8px;align-items:center;color:#6E7480;font-size:11.5px;padding:0 2px 6px;\">\n                <span>Serie<\u002Fspan><span style=\"text-align:center;\">Reps<\u002Fspan><span style=\"text-align:center;\">Peso ({{ unit }})<\u002Fspan><span><\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ ex.sets }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div style=\"display:grid;grid-template-columns:36px 1fr 1fr 34px;gap:8px;align-items:center;margin-bottom:8px;\">\n                  <span style=\"font-family:'Archivo';font-weight:700;color:#8A8F9C;font-size:15px;text-align:center;\">{{ s.n }}<\u002Fspan>\n                  <input value=\"{{ s.reps }}\" oninput=\"{{ s.onReps }}\" type=\"number\" inputmode=\"numeric\" placeholder=\"0\" style=\"background:#0E1014;border:1px solid #2A2E37;border-radius:9px;color:#F4F5F7;font-family:'Space Grotesk';font-size:15px;padding:9px;text-align:center;width:100%;\">\n                  <input value=\"{{ s.weight }}\" oninput=\"{{ s.onWeight }}\" type=\"number\" inputmode=\"decimal\" placeholder=\"0\" style=\"background:#0E1014;border:1px solid #2A2E37;border-radius:9px;color:#F4F5F7;font-family:'Space Grotesk';font-size:15px;padding:9px;text-align:center;width:100%;\">\n                  <div onclick=\"{{ s.remove }}\" style=\"text-align:center;color:#5A5F6B;cursor:pointer;font-size:16px;\">−<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div onclick=\"{{ ex.addSet }}\" style=\"margin-top:4px;text-align:center;border:1px dashed #2E323C;border-radius:10px;padding:9px;color:#A7ACB8;font-size:13.5px;cursor:pointer;\">+ Añadir serie<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <sc-if value=\"{{ noDraft }}\">\n            <div style=\"border:1px dashed #2A2E37;border-radius:16px;padding:26px;text-align:center;color:#6E7480;font-size:14px;margin-bottom:12px;\">Elige una rutina arriba o añade ejercicios manualmente.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div onclick=\"{{ addExercise }}\" style=\"text-align:center;border:1px solid #2A2E37;background:#171A20;border-radius:14px;padding:13px;color:#F4F5F7;font-weight:600;font-size:15px;cursor:pointer;\">+ Añadir ejercicio<\u002Fdiv>\n          <div onclick=\"{{ saveWorkout }}\" style=\"background:var(--ac);color:var(--act);border-radius:14px;padding:15px;text-align:center;font-weight:700;font-size:16px;cursor:pointer;margin-top:12px;\">Guardar entreno<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===================== MEASURE ===================== -->\n        <sc-if value=\"{{ isMeasure }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"margin-bottom:18px;\">\n            <div style=\"color:#8A8F9C;font-size:14px;\">Actualización mensual<\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:28px;letter-spacing:-0.02em;line-height:1;\">{{ monthLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasPrev }}\">\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:12px;padding:10px 14px;font-size:13px;color:#A7ACB8;margin-bottom:14px;\">Último registro · {{ prevLabel }}: <b style=\"color:#F4F5F7;\">{{ prevWeight }} {{ unit }}<\u002Fb> · {{ prevFat }}% grasa<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:16px;margin-bottom:12px;\">\n            <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:9px;\">Peso corporal ({{ unit }})<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:10px;\">\n              <input value=\"{{ mWeight }}\" oninput=\"{{ onMWeight }}\" type=\"number\" inputmode=\"decimal\" placeholder=\"{{ mWeightPh }}\" style=\"flex:1;background:#0E1014;border:1px solid #2A2E37;border-radius:12px;color:#F4F5F7;font-family:'Archivo';font-weight:800;font-size:30px;letter-spacing:-0.02em;padding:12px 16px;\">\n              <span style=\"color:#8A8F9C;font-size:16px;\">{{ unit }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:16px;margin-bottom:14px;\">\n            <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:9px;\">% de grasa corporal<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:10px;\">\n              <input value=\"{{ mFat }}\" oninput=\"{{ onMFat }}\" type=\"number\" inputmode=\"decimal\" placeholder=\"{{ mFatPh }}\" style=\"flex:1;background:#0E1014;border:1px solid #2A2E37;border-radius:12px;color:#F4F5F7;font-family:'Archivo';font-weight:800;font-size:30px;letter-spacing:-0.02em;padding:12px 16px;\">\n              <span style=\"color:#8A8F9C;font-size:16px;\">%<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div onclick=\"{{ saveMeasure }}\" style=\"background:var(--ac);color:var(--act);border-radius:14px;padding:15px;text-align:center;font-weight:700;font-size:16px;cursor:pointer;margin-bottom:18px;\">Guardar medidas<\u002Fdiv>\n\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:4px 16px 10px;\">\n            <div style=\"padding:13px 0 4px;color:#8A8F9C;font-size:13px;\">Historial<\u002Fdiv>\n            <sc-for list=\"{{ measureHistory }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid #20242C;\">\n                <span style=\"font-weight:600;font-size:14.5px;text-transform:capitalize;\">{{ m.label }}<\u002Fspan>\n                <span style=\"color:#A7ACB8;font-size:14px;\">{{ m.weight }} · {{ m.fat }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noMeasures }}\"><div style=\"padding:18px 0;text-align:center;color:#6E7480;font-size:14px;\">Sin registros aún.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===================== PROGRESS ===================== -->\n        <sc-if value=\"{{ isProgress }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"margin-bottom:16px;\">\n            <div style=\"color:#8A8F9C;font-size:14px;\">Tu evolución<\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:28px;letter-spacing:-0.02em;line-height:1;\">Progreso<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;\">\n            <sc-for list=\"{{ progModeChips }}\" as=\"t\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ t.go }}\" style=\"padding:8px 16px;border-radius:999px;border:1px solid {{ t.bd }};background:{{ t.bg }};color:{{ t.fg }};font-size:14px;font-weight:600;cursor:pointer;\">{{ t.name }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isExerciseMode }}\">\n            <sc-if value=\"{{ hasExercises }}\">\n            <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:7px;\">Ejercicio<\u002Fdiv>\n            <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;\">\n              <sc-for list=\"{{ exerciseChips }}\" as=\"e\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ e.go }}\" style=\"padding:7px 13px;border-radius:9px;border:1px solid {{ e.bd }};background:{{ e.bg }};color:{{ e.fg }};font-size:13px;font-weight:500;cursor:pointer;\">{{ e.name }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noExercises }}\">\n            <div style=\"border:1px dashed #2A2E37;border-radius:16px;padding:26px;text-align:center;color:#6E7480;font-size:14px;margin-bottom:14px;\">Registra entrenos con peso para ver el progreso por ejercicio.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:20px;padding:16px 16px 6px;margin-bottom:12px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;\">\n              <div style=\"color:#8A8F9C;font-size:13px;\">{{ progTitle }}<\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:22px;\">{{ progCurrent }} <span style=\"font-size:12px;color:#8A8F9C;font-weight:500;\">{{ progUnit }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasProgData }}\">\n            <svg viewBox=\"0 0 600 200\" width=\"100%\" height=\"auto\" style=\"display:block;\">\n              <line x1=\"10\" y1=\"50\" x2=\"590\" y2=\"50\" stroke=\"#20242C\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"10\" y1=\"110\" x2=\"590\" y2=\"110\" stroke=\"#20242C\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"10\" y1=\"170\" x2=\"590\" y2=\"170\" stroke=\"#20242C\" stroke-width=\"1\"><\u002Fline>\n              <polygon points=\"{{ progChart.area }}\" fill=\"var(--ac)\" opacity=\"0.10\"><\u002Fpolygon>\n              <polyline points=\"{{ progChart.points }}\" fill=\"none\" stroke=\"var(--ac)\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n              <circle cx=\"{{ progChart.last.x }}\" cy=\"{{ progChart.last.y }}\" r=\"6\" fill=\"var(--ac)\"><\u002Fcircle>\n            <\u002Fsvg>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noProgData }}\"><div style=\"padding:34px 0;text-align:center;color:#6E7480;font-size:14px;\">Aún no hay suficientes datos para graficar.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;\">\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:16px;padding:13px;\">\n              <div style=\"color:#8A8F9C;font-size:12px;margin-bottom:5px;\">Cambio total<\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:20px;color:{{ progTotalCol }};\">{{ progTotal }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:16px;padding:13px;\">\n              <div style=\"color:#8A8F9C;font-size:12px;margin-bottom:5px;\">Actual<\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:20px;\">{{ progCurrent }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#15171D;border:1px solid #262A33;border-radius:16px;padding:13px;\">\n              <div style=\"color:#8A8F9C;font-size:12px;margin-bottom:5px;\">{{ bestLabel }}<\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:20px;\">{{ progBest }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:4px 16px 10px;\">\n            <div style=\"padding:13px 0 4px;color:#8A8F9C;font-size:13px;\">Récords personales (PR)<\u002Fdiv>\n            <sc-for list=\"{{ prs }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid #20242C;\">\n                <span style=\"font-weight:600;font-size:14.5px;\">{{ p.name }}<\u002Fspan>\n                <span style=\"font-family:'Archivo';font-weight:700;font-size:15px;color:var(--ac);\">{{ p.weight }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noPrs }}\"><div style=\"padding:18px 0;text-align:center;color:#6E7480;font-size:14px;\">Registra entrenos con peso para ver tus PR.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===================== SETTINGS ===================== -->\n        <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"margin-bottom:18px;\">\n            <div style=\"color:#8A8F9C;font-size:14px;\">Personaliza tu app<\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:28px;letter-spacing:-0.02em;line-height:1;\">Ajustes<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Perfil -->\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:16px;margin-bottom:14px;\">\n            <div style=\"font-weight:600;font-size:15px;margin-bottom:10px;\">Perfil<\u002Fdiv>\n            <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:6px;\">Tu nombre<\u002Fdiv>\n            <input value=\"{{ profileName }}\" oninput=\"{{ onName }}\" placeholder=\"¿Cómo te llamas?\" style=\"width:100%;background:#0E1014;border:1px solid #2A2E37;border-radius:11px;color:#F4F5F7;font-family:'Space Grotesk';font-weight:600;font-size:16px;padding:12px 14px;\">\n          <\u002Fdiv>\n\n          <!-- Rutinas -->\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:16px;margin-bottom:14px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;\">\n              <div style=\"font-weight:600;font-size:15px;\">Rutinas<\u002Fdiv>\n              <div onclick=\"{{ addRoutine }}\" style=\"color:var(--ac);font-size:13.5px;font-weight:600;cursor:pointer;\">+ Nueva rutina<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:12px;\">Crea plantillas con sus ejercicios. Al registrar, eliges una y se cargan automáticamente.<\u002Fdiv>\n\n            <sc-for list=\"{{ routinesView }}\" as=\"rt\" hint-placeholder-count=\"2\">\n              <div style=\"border:1px solid #262A33;border-radius:14px;padding:12px;margin-bottom:10px;background:#0E1014;\">\n                <div style=\"display:flex;gap:8px;align-items:center;margin-bottom:10px;\">\n                  <input value=\"{{ rt.name }}\" oninput=\"{{ rt.onName }}\" placeholder=\"Nombre de la rutina\" style=\"flex:1;background:#15171D;border:1px solid #2A2E37;border-radius:9px;color:#F4F5F7;font-family:'Space Grotesk';font-weight:600;font-size:15px;padding:9px 11px;\">\n                  <div onclick=\"{{ rt.del }}\" style=\"width:36px;height:36px;flex:0 0 36px;border-radius:9px;border:1px solid #3A2326;color:#FF6B5E;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;\">×<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-for list=\"{{ rt.exercises }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;gap:8px;align-items:center;margin-bottom:7px;\">\n                    <span style=\"color:#5A5F6B;font-size:13px;width:14px;\">{{ ex.n }}<\u002Fspan>\n                    <input value=\"{{ ex.value }}\" oninput=\"{{ ex.onChange }}\" placeholder=\"Ejercicio\" style=\"flex:1;background:#15171D;border:1px solid #2A2E37;border-radius:8px;color:#F4F5F7;font-family:'Space Grotesk';font-size:14px;padding:8px 10px;\">\n                    <div onclick=\"{{ ex.remove }}\" style=\"color:#5A5F6B;cursor:pointer;font-size:16px;width:20px;text-align:center;\">−<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div onclick=\"{{ rt.addEx }}\" style=\"margin-top:4px;text-align:center;border:1px dashed #2E323C;border-radius:9px;padding:8px;color:#A7ACB8;font-size:13px;cursor:pointer;\">+ Añadir ejercicio<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <sc-if value=\"{{ noRoutines }}\">\n              <div style=\"color:#6E7480;font-size:13.5px;margin-bottom:10px;\">Aún no tienes rutinas. Crea una o empieza con una sugerencia:<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;gap:7px;flex-wrap:wrap;\">\n              <sc-for list=\"{{ routineSuggestions }}\" as=\"sg\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ sg.go }}\" style=\"padding:7px 13px;border-radius:999px;border:1px dashed #2E323C;color:#A7ACB8;font-size:13px;cursor:pointer;\">+ {{ sg.name }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Datos -->\n          <div style=\"background:#15171D;border:1px solid #262A33;border-radius:18px;padding:16px;margin-bottom:14px;\">\n            <div style=\"font-weight:600;font-size:15px;margin-bottom:3px;\">Datos y respaldo<\u002Fdiv>\n            <div style=\"color:#8A8F9C;font-size:13px;margin-bottom:12px;\">{{ entryCount }} registros guardados en este dispositivo.<\u002Fdiv>\n            <div style=\"display:flex;gap:10px;margin-bottom:10px;\">\n              <div onclick=\"{{ exportCSV }}\" style=\"flex:1;text-align:center;border:1px solid #2A2E37;background:#0E1014;border-radius:11px;padding:12px;font-weight:600;font-size:14px;cursor:pointer;\">Exportar CSV<\u002Fdiv>\n              <div onclick=\"{{ exportJSON }}\" style=\"flex:1;text-align:center;border:1px solid #2A2E37;background:#0E1014;border-radius:11px;padding:12px;font-weight:600;font-size:14px;cursor:pointer;\">Exportar JSON<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ doBackup }}\" style=\"background:var(--ac);color:var(--act);border-radius:11px;padding:13px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:10px;\">Crear respaldo (.json)<\u002Fdiv>\n            <label style=\"display:block;border:1px dashed #2E323C;border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin-bottom:10px;\">\n              <div style=\"font-weight:600;font-size:14.5px;\">Restaurar desde archivo<\u002Fdiv>\n              <div style=\"color:#8A8F9C;font-size:12px;margin-top:3px;\">Reemplaza tus datos actuales con un respaldo<\u002Fdiv>\n              <input type=\"file\" accept=\"application/json,.json\" onchange=\"{{ onRestore }}\" style=\"display:none;\">\n            <\u002Flabel>\n            <div onclick=\"{{ clearAll }}\" style=\"text-align:center;border:1px solid #3A2326;color:#FF6B5E;border-radius:11px;padding:12px;font-weight:600;font-size:14px;cursor:pointer;\">Borrar todos los datos<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"text-align:center;color:#6E7480;font-size:12.5px;line-height:1.5;\">Todo se guarda localmente en tu navegador.<br>Haz respaldos periódicos para no perder tu progreso.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- ===== BOTTOM NAV (narrow) ===== -->\n  <sc-if value=\"{{ isNarrow }}\" hint-placeholder-val=\"{{ true }}\">\n  <nav style=\"position:fixed;left:0;right:0;bottom:0;background:rgba(14,16,20,0.92);backdrop-filter:blur(12px);border-top:1px solid #1C1F26;display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:40;\">\n    <div onclick=\"{{ nav.dashboard.go }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ nav.dashboard.col }};font-size:10.5px;padding:5px 0;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"9\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"5\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"12\" width=\"7\" height=\"9\" rx=\"1.5\"><\u002Frect><rect x=\"3\" y=\"16\" width=\"7\" height=\"5\" rx=\"1.5\"><\u002Frect><\u002Fsvg>Inicio<\u002Fdiv>\n    <div onclick=\"{{ nav.log.go }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ nav.log.col }};font-size:10.5px;padding:5px 0;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6.5 6.5l11 11M5 9l-2 2 3 3M19 15l2-2-3-3M9 5L7 3M15 19l2 2\"><\u002Fpath><\u002Fsvg>Registrar<\u002Fdiv>\n    <div onclick=\"{{ nav.progress.go }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ nav.progress.col }};font-size:10.5px;padding:5px 0;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 19V5M4 19h16M8 15l3-4 3 2 4-6\"><\u002Fpath><\u002Fsvg>Progreso<\u002Fdiv>\n    <div onclick=\"{{ nav.measure.go }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ nav.measure.col }};font-size:10.5px;padding:5px 0;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"7\" width=\"18\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M7 7v3M11 7v4M15 7v3M19 7v4\"><\u002Fpath><\u002Fsvg>Medidas<\u002Fdiv>\n    <div onclick=\"{{ nav.settings.go }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ nav.settings.col }};font-size:10.5px;padding:5px 0;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3.2\"><\u002Fcircle><path d=\"M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8\"><\u002Fpath><\u002Fsvg>Ajustes<\u002Fdiv>\n  <\u002Fnav>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ toast }}\">\n    <div style=\"position:fixed;left:50%;transform:translateX(-50%);bottom:92px;background:#F4F5F7;color:#0C0D11;padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,0.5);\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 420, &quot;height&quot;: 880 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Lima&quot;, &quot;options&quot;: [&quot;Lima&quot;, &quot;Naranja&quot;, &quot;Azul&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;units&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;kg&quot;, &quot;options&quot;: [&quot;kg&quot;, &quot;lb&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;startView&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Inicio&quot;, &quot;options&quot;: [&quot;Inicio&quot;, &quot;Registrar&quot;, &quot;Progreso&quot;], &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.KEY = 'gymtracker_v2';\n    this.MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];\n    this.MS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];\n    this.SUGGEST = ['Push','Pull','Piernas','Full body','Torso','Empuje'];\n    this.state = {\n      view: 'dashboard',\n      data: { profile: { name: '' }, routines: [], measurements: [], workouts: [] },\n      draft: { routine: '', exercises: [] },\n      mDraft: { weight: '', fat: '' },\n      progMode: 'weight',\n      selExercise: '',\n      isWide: (typeof window !== 'undefined' && window.innerWidth >= 900),\n      toast: '',\n    };\n  }\n\n  componentDidMount() {\n    let data = null;\n    try { const raw = localStorage.getItem(this.KEY); if (raw) data = JSON.parse(raw); } catch (e) {}\n    if (data) {\n      this.setState({ data: {\n        profile: data.profile || { name: '' },\n        routines: Array.isArray(data.routines) ? data.routines : [],\n        measurements: Array.isArray(data.measurements) ? data.measurements : [],\n        workouts: Array.isArray(data.workouts) ? data.workouts : [],\n      } });\n    }\n    const sv = { 'Inicio': 'dashboard', 'Registrar': 'log', 'Progreso': 'progress' }[this.props.startView];\n    if (sv) this.setState({ view: sv });\n    this._onResize = () => { const w = window.innerWidth >= 900; if (w !== this.state.isWide) this.setState({ isWide: w }); };\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount() { if (this._onResize) window.removeEventListener('resize', this._onResize); clearTimeout(this._t); }\n\n  // ---- persistence ----\n  commit(data) { this.setState({ data }); try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch (e) {} }\n  patch(part) { this.commit({ ...this.state.data, ...part }); }\n  go(view) { this.setState({ view, toast: '' }); }\n  showToast(msg) { this.setState({ toast: msg }); clearTimeout(this._t); this._t = setTimeout(() => this.setState({ toast: '' }), 2200); }\n\n  // ---- units / format ----\n  get U() { return this.props.units === 'lb' ? 'lb' : 'kg'; }\n  dispW(kg) { return this.props.units === 'lb' ? kg * 2.20462 : kg; }\n  toKg(v) { const n = parseFloat(v); if (isNaN(n)) return null; return this.props.units === 'lb' ? n / 2.20462 : n; }\n  r1(n) { return Math.round(n * 10) / 10; }\n  fmt(n) { const r = this.r1(n); return Number.isInteger(r) ? String(r) : r.toFixed(1); }\n  fmtK(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(Math.round(n)); }\n  curMonth() { return new Date().toISOString().slice(0, 7); }\n  todayISO() { return new Date().toISOString().slice(0, 10); }\n  monthLabel(ym) { const p = ym.split('-'); return this.MONTHS[(+p[1]) - 1] + ' ' + p[0]; }\n  shortMonth(ym) { const p = ym.split('-'); return this.MS[(+p[1]) - 1] + ' ' + p[0]; }\n  dayLabel(iso) { const d = new Date(iso + 'T00:00:00'); return d.getDate() + ' ' + this.MS[d.getMonth()]; }\n\n  // ---- profile ----\n  setName(v) { this.patch({ profile: { ...this.state.data.profile, name: v } }); }\n\n  // ---- routines ----\n  addRoutine(name) { const rt = { id: 'r' + Date.now() + Math.floor(Math.random()*1000), name: name || 'Nueva rutina', exercises: [''] }; this.patch({ routines: [...this.state.data.routines, rt] }); }\n  renameRoutine(id, name) { this.patch({ routines: this.state.data.routines.map(r => r.id === id ? { ...r, name } : r) }); }\n  deleteRoutine(id) { this.patch({ routines: this.state.data.routines.filter(r => r.id !== id) }); }\n  addRoutineEx(id) { this.patch({ routines: this.state.data.routines.map(r => r.id === id ? { ...r, exercises: [...r.exercises, ''] } : r) }); }\n  updateRoutineEx(id, idx, val) { this.patch({ routines: this.state.data.routines.map(r => r.id === id ? { ...r, exercises: r.exercises.map((e, i) => i === idx ? val : e) } : r) }); }\n  removeRoutineEx(id, idx) { this.patch({ routines: this.state.data.routines.map(r => r.id === id ? { ...r, exercises: r.exercises.filter((e, i) => i !== idx) } : r) }); }\n\n  // ---- workout draft ----\n  selectRoutine(rt) { this.setState({ draft: { routine: rt.name, exercises: (rt.exercises || []).filter(n => n && n.trim()).map(n => ({ name: n.trim(), sets: [{ reps: '', weight: '' }] })) } }); }\n  setFree() { this.setState(s => ({ draft: { ...s.draft, routine: 'Libre' } })); }\n  addExercise() { this.setState(s => ({ draft: { ...s.draft, exercises: [...s.draft.exercises, { name: '', sets: [{ reps: '', weight: '' }] }] } })); }\n  updateEx(i, k, v) { this.setState(s => { const ex = s.draft.exercises.slice(); ex[i] = { ...ex[i],
